substitutions:
  _REGION: us-central1
  _SERVICE: worship-flow
  _REPO: worship-flow

steps:
  - name: gcr.io/cloud-builders/docker
    args: [
      'build',
      '--cache-from', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$SHORT_SHA',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$SHORT_SHA',
      '.'
    ]
  - name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$SHORT_SHA']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      'run', 'deploy', '$_SERVICE',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$SHORT_SHA',
      '--region', '$_REGION',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  # Run database migrations after deployment
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      'run', 'jobs', 'update', 'worship-flow-migrate',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$SHORT_SHA',
      '--region', '$_REGION'
    ]
    # Ignore errors if job doesn't exist yet
    allowFailure: true

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      'run', 'jobs', 'execute', 'worship-flow-migrate',
      '--region', '$_REGION',
      '--wait'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$SHORT_SHA
