substitutions:
  _REGION: us-central1
  _SERVICE: worship-flow
  _REPO: worship-flow
  _IMAGE_TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    args: [
      'build',
      '--cache-from', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_TAG',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_TAG',
      '.'
    ]
  - name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_TAG']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      'run', 'deploy', '$_SERVICE',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_TAG',
      '--region', '$_REGION',
      '--platform', 'managed',
      '--update-env-vars', 'DJANGO_DEBUG=False,FIRESTORE_DATABASE_ID=worship-flow-cheap,TF_ENABLE_ONEDNN_OPTS=0',
      '--concurrency', '4',
      '--allow-unauthenticated'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_TAG
