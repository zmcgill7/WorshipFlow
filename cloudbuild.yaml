substitutions:
  _REGION: us-central1
  _SERVICE: worship-flow
  _REPO: worship-flow

steps:
  - name: gcr.io/cloud-builders/docker
    env: ['DOCKER_BUILDKIT=1']
    args: [
      'build',
      '--cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:cache',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA',
      '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:cache',
      '.'
    ]
  - name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:cache']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      'run', 'deploy', '$_SERVICE',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA',
      '--region', '$_REGION',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  # Run database migrations after deployment
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      'run', 'jobs', 'create', 'worship-flow-migrate',
      '--image', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA',
      '--region', '$_REGION',
      '--set-env-vars', 'DJANGO_DEBUG=False,DB_NAME=worshipflow,DB_USER=worshipflow_user,CLOUD_SQL_CONNECTION=$$PROJECT_ID:$_REGION:worshipflow-db',
      '--set-secrets', 'DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DB_PASSWORD=DB_PASSWORD:latest',
      '--set-cloudsql-instances', '$$PROJECT_ID:$_REGION:worshipflow-db',
      '--command', 'python',
      '--args', 'manage.py,migrate,--noinput'
    ]
    # Ignore errors if job already exists
    allowFailure: true

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [
      'run', 'jobs', 'execute', 'worship-flow-migrate',
      '--region', '$_REGION',
      '--wait'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA
